<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1629">
    <title>中正大學聯盟賽 — 戰績查看</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Microsoft JhengHei','微軟正黑體',Arial,sans-serif; background:#0f1629; color:#e8eaf0; min-height:100vh; font-size:15px; }

        /* ── Header ── */
        header { background:linear-gradient(135deg,#1a237e,#283593); padding:14px 16px 12px; border-bottom:3px solid #ffd600; }
        .header-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
        header h1 { font-size:1.25rem; font-weight:700; color:#ffd600; letter-spacing:2px; }
        .refresh-area { display:flex; align-items:center; gap:8px; }
        .refresh-btn { padding:5px 12px; border-radius:16px; border:1px solid rgba(144,202,249,.4); background:rgba(144,202,249,.1); color:#90caf9; font-size:.78rem; font-family:inherit; cursor:pointer; }
        .refresh-btn:active { background:rgba(144,202,249,.25); }
        .last-update { font-size:.72rem; color:#546e7a; }
        .readonly-badge { display:inline-block; background:#b71c1c; color:#ffcdd2; border-radius:8px; font-size:.68rem; padding:2px 8px; font-weight:700; letter-spacing:.5px; }

        /* ── Bars ── */
        .top-bar { background:#141829; padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #2a3050; flex-wrap:wrap; overflow-x:auto; }
        .bar-label { font-size:.78rem; color:#78909c; white-space:nowrap; }
        .tab-btn { padding:6px 16px; border-radius:20px; border:1px solid #3a4070; background:#1a1f3a; color:#90caf9; cursor:pointer; font-size:.85rem; font-family:inherit; font-weight:600; white-space:nowrap; }
        .tab-btn.active { background:#ffd600; color:#1a1a2e; border-color:#ffd600; }

        .mode-bar { background:#0d1122; display:flex; border-bottom:1px solid #2a3050; }
        .mode-btn { flex:1; padding:10px; border:none; border-bottom:2px solid transparent; background:transparent; color:#546e7a; cursor:pointer; font-size:.9rem; font-family:inherit; font-weight:600; }
        .mode-btn.active { color:#ffd600; border-bottom-color:#ffd600; }

        .round-bar { background:#0a0f20; padding:8px 16px; display:flex; gap:4px; border-bottom:1px solid #2a3050; flex-wrap:wrap; }
        .round-btn { padding:6px 14px; border-radius:6px; border:1px solid transparent; background:transparent; color:#546e7a; cursor:pointer; font-size:.83rem; font-family:inherit; font-weight:600; }
        .round-btn.active { background:#1a1f3a; color:#e8eaf0; border-color:#3a4070; }

        /* ── Search ── */
        .search-section { padding:14px 16px 10px; background:#141829; border-bottom:1px solid #2a3050; }
        .search-label { font-size:.8rem; color:#78909c; margin-bottom:6px; font-weight:600; }
        .search-input-wrap { position:relative; }
        .search-input { width:100%; background:#0f1629; border:1px solid #2e3660; color:#e8eaf0; padding:10px 14px 10px 36px; border-radius:8px; font-size:.95rem; font-family:inherit; }
        .search-input:focus { outline:none; border-color:#5c6bc0; }
        .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#546e7a; font-size:1rem; pointer-events:none; }
        .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#546e7a; cursor:pointer; font-size:1.1rem; padding:2px 4px; display:none; }
        .search-clear.visible { display:block; }

        /* ── Search Results ── */
        .search-results { padding:12px 16px; }
        .search-result-header { font-size:.85rem; color:#90caf9; font-weight:600; margin-bottom:10px; }
        .search-result-header span { color:#ffd600; }
        .game-result-card { background:#1a1f3a; border-radius:8px; padding:12px 14px; margin-bottom:8px; border:1px solid #2a3050; display:flex; align-items:center; gap:10px; }
        .game-result-card .gr-tag { font-size:.7rem; padding:2px 7px; border-radius:8px; background:#0f1629; color:#78909c; border:1px solid #2a3050; white-space:nowrap; }
        .gr-body { flex:1; }
        .gr-vs { font-size:.8rem; color:#78909c; }
        .gr-vs span { color:#e8eaf0; font-weight:600; }
        .gr-score { font-size:1.05rem; font-weight:700; color:#ffd600; }
        .gr-date { font-size:.72rem; color:#4a5080; }
        .gr-result { font-size:.75rem; padding:2px 8px; border-radius:10px; font-weight:700; white-space:nowrap; }
        .gr-win  { background:#1b5e20; color:#a5d6a7; border:1px solid #388e3c; }
        .gr-loss { background:#7f0000; color:#ffcdd2; border:1px solid #c62828; }
        .search-summary { font-size:.83rem; color:#546e7a; padding:8px 0 4px; text-align:center; }
        .no-results { text-align:center; padding:24px; color:#4a5080; font-size:.9rem; }

        /* ── Main Content ── */
        .main-content { padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        @media(max-width:680px){ .main-content{ grid-template-columns:1fr; } }

        /* ── Division ── */
        .division-section { background:#1a1f3a; border-radius:10px; overflow:hidden; border:1px solid #2a3050; }
        .division-header { padding:12px 16px; display:flex; align-items:center; gap:8px; }
        .division-header.east { background:linear-gradient(135deg,#1b5e20,#2e7d32); border-bottom:2px solid #66bb6a; }
        .division-header.west { background:linear-gradient(135deg,#b71c1c,#c62828); border-bottom:2px solid #ef5350; }
        .division-title { font-size:1.05rem; font-weight:700; color:#fff; letter-spacing:2px; }
        .team-count { font-size:.72rem; color:rgba(255,255,255,.6); }

        /* ── Table ── */
        .standings-table { width:100%; border-collapse:collapse; font-size:.85rem; }
        .standings-table thead th { background:#0d1025; color:#78909c; padding:7px 8px; text-align:center; font-weight:600; font-size:.78rem; border-bottom:1px solid #2a3050; }
        .standings-table thead th.left { text-align:left; }
        .standings-table tbody tr { border-bottom:1px solid #1e2540; }
        .standings-table tbody tr.cutoff-line { border-bottom:2px dashed #ffd600 !important; }
        .standings-table tbody td { padding:9px 8px; text-align:center; white-space:nowrap; }
        .standings-table tbody td.left { text-align:left; }
        .team-name-cell { display:flex; align-items:center; gap:6px; font-weight:600; font-size:.88rem; }
        .status-badge { font-size:.62rem; padding:2px 5px; border-radius:8px; font-weight:700; }
        .status-clinched  { background:#1b5e20; color:#a5d6a7; border:1px solid #388e3c; }
        .status-eliminated { background:#7f0000; color:#ffcdd2; border:1px solid #c62828; }
        .rank-cell { color:#546e7a; font-size:.82rem; }
        .medal-gold   { color:#ffd600; font-weight:700; }
        .medal-silver { color:#b0bec5; font-weight:700; }
        .medal-bronze { color:#a1887f; font-weight:700; }
        .win-color  { color:#66bb6a; font-weight:700; }
        .loss-color { color:#ef5350; }
        .gb-color   { color:#90a4ae; }
        .playoff-note { font-size:.7rem; color:#ffd600; padding:4px 14px 5px; background:rgba(255,214,0,.06); border-bottom:1px solid #2a3050; }
        .empty-state { padding:28px; text-align:center; color:#3a4570; font-size:.9rem; }

        /* ── Matchup Cards ── */
        .matchup-section-title { font-size:.82rem; color:#78909c; padding:12px 14px 6px; font-weight:600; letter-spacing:.5px; }
        .matchup-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 12px 14px; }
        @media(max-width:520px){ .matchup-grid{ grid-template-columns:1fr; } }
        .matchup-card { background:#0f1629; border:1px solid #2a3050; border-radius:10px; padding:14px 10px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px; }
        .matchup-card.played { border-color:#1e2a40; }
        .matchup-side { text-align:center; }
        .match-seed { font-size:.68rem; color:#78909c; margin-bottom:3px; }
        .match-team { font-size:.88rem; font-weight:600; }
        .match-team.pending { color:#4a5080; font-style:italic; font-size:.8rem; }
        .match-team.winner { color:#66bb6a; }
        .match-team.loser  { color:#ef5350; }
        .match-center { text-align:center; }
        .match-score { font-size:1.2rem; font-weight:700; color:#ffd600; min-width:64px; }
        .match-score.pending { font-size:.82rem; color:#4a5080; }
        .match-label { font-size:.66rem; color:#78909c; margin-top:3px; }

        /* ── Round 2 ── */
        .r2-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0; }
        @media(max-width:680px){ .r2-grid{ grid-template-columns:1fr; } }
        .r2-group-section { background:#1a1f3a; border-radius:10px; overflow:hidden; border:1px solid #2a3050; }
        .r2-group-header { padding:11px 14px; }
        .r2-group-header.groupA { background:linear-gradient(135deg,#1a237e,#283593); border-bottom:2px solid #5c6bc0; }
        .r2-group-header.groupB { background:linear-gradient(135deg,#4a148c,#6a1b9a); border-bottom:2px solid #ab47bc; }
        .r2-group-title { font-size:1rem; font-weight:700; color:#fff; letter-spacing:2px; }

        /* ── Finals ── */
        .finals-wrap { padding:16px; display:flex; justify-content:center; }
        .finals-wrap .matchup-card { max-width:420px; width:100%; }

        /* ── Playoff Notice ── */
        .po-notice { padding:32px 16px; text-align:center; color:#4a5080; font-size:.9rem; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:#0f1629; }
        ::-webkit-scrollbar-thumb { background:#2e3660; border-radius:2px; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>中正大學聯盟賽</h1>
        <div class="refresh-area">
            <span class="readonly-badge">查看模式</span>
            <button class="refresh-btn" onclick="manualRefresh()">重新整理</button>
        </div>
    </div>
    <div class="last-update" id="last-update-label">載入中…</div>
</header>

<div id="season-bar" class="top-bar"></div>
<div id="mode-bar" class="mode-bar"></div>
<div id="round-bar" class="round-bar" style="display:none"></div>
<div id="search-area" style="display:none">
    <div class="search-section">
        <div class="search-label">查詢隊伍對戰紀錄</div>
        <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search-input" type="text" placeholder="輸入隊名關鍵字…" oninput="onSearchInput()" autocomplete="off">
            <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
    </div>
    <div id="search-results" style="display:none"></div>
</div>
<div id="main-content" class="main-content"></div>

<script>
// ============================================================
//  STATE (read-only from localStorage)
// ============================================================
let state = { currentSeason:'25-26', seasons:{'25-26':{divisions:{east:[],west:[]},games:[],playoff:null}} };
let view  = { mode:'regular', round:'round1' };

// Check if data is embedded in URL hash (#d=base64...)
function getUrlData(){
    try{
        const hash=location.hash;
        const m=hash.match(/[#&]d=([^&]*)/);
        if(m) return JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    }catch(e){}
    return null;
}

let isUrlMode = false; // true = reading from URL, false = reading from localStorage

function loadState(){
    const urlData = getUrlData();
    if(urlData){
        isUrlMode = true;
        state = urlData;
        document.getElementById('last-update-label').textContent = '資料來源：分享連結（此為快照，非即時資料）';
        document.getElementById('refresh-area').style.display = 'none';
    } else {
        isUrlMode = false;
        try{
            const raw=localStorage.getItem('ccuLeague_v3');
            if(raw) state=JSON.parse(raw);
        }catch(e){}
        document.getElementById('last-update-label').textContent='最後更新：'+new Date().toLocaleTimeString('zh-TW');
    }
}

function manualRefresh(){ loadState(); renderAll(); }

// Auto-refresh every 60 seconds (only in localStorage mode)
setInterval(()=>{ if(!isUrlMode){ loadState(); renderAll(); } }, 60000);
// Refresh on tab focus
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ loadState(); renderAll(); } });

// ============================================================
//  HELPERS
// ============================================================
function season(){ return state.seasons[state.currentSeason]||{divisions:{east:[],west:[]},games:[],playoff:null}; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getTeam(id){ const s=season(); for(const d of['east','west']){ const t=s.divisions[d].find(t=>t.id===id); if(t) return t; } return null; }

// ============================================================
//  REGULAR SEASON STATS (same as admin)
// ============================================================
function getTeamStats(teamId,division){
    let wins=0,losses=0,pf=0,pa=0;
    for(const g of season().games){
        if(g.division!==division) continue;
        if(g.team1Id===teamId){ pf+=g.score1;pa+=g.score2;g.score1>g.score2?wins++:losses++; }
        else if(g.team2Id===teamId){ pf+=g.score2;pa+=g.score1;g.score2>g.score1?wins++:losses++; }
    }
    return {wins,losses,pf,pa};
}
function getGroupH2H(teamIds,division){
    const h={}; for(const id of teamIds) h[id]={wins:0,losses:0,pf:0,pa:0};
    for(const g of season().games){
        if(g.division!==division) continue;
        if(!teamIds.includes(g.team1Id)||!teamIds.includes(g.team2Id)) continue;
        const {team1Id:t1,team2Id:t2,score1:s1,score2:s2}=g;
        if(s1>s2){h[t1].wins++;h[t2].losses++;}else{h[t2].wins++;h[t1].losses++;}
        h[t1].pf+=s1;h[t1].pa+=s2;h[t2].pf+=s2;h[t2].pa+=s1;
    }
    return h;
}
function getRemainingGames(teamId,division){
    const n=season().divisions[division].length;
    const {wins,losses}=getTeamStats(teamId,division);
    return Math.max(0,(n-1)-wins-losses);
}
function getStandings(division){
    const teams=season().divisions[division];
    if(!teams.length) return [];
    const entries=teams.map(t=>{ const s=getTeamStats(t.id,division); const gp=s.wins+s.losses; return {...t,...s,gp,winPct:gp>0?s.wins/gp:null,remaining:getRemainingGames(t.id,division)}; });
    entries.sort((a,b)=>{ const pa=a.winPct??-1,pb=b.winPct??-1; if(Math.abs(pa-pb)>1e-8) return pb-pa; if(a.wins!==b.wins) return b.wins-a.wins; return a.losses-b.losses; });
    const result=[]; let i=0;
    while(i<entries.length){
        let j=i+1;
        while(j<entries.length){ const a=entries[i],b=entries[j]; if(Math.abs((a.winPct??-1)-(b.winPct??-1))<1e-8&&a.wins===b.wins&&a.losses===b.losses) j++; else break; }
        result.push(...(j-i===1?[entries[i]]:sortByH2H(entries.slice(i,j),division)));
        i=j;
    }
    return result;
}
function sortByH2H(group,division){
    if(group.length<=1) return group;
    const h=getGroupH2H(group.map(t=>t.id),division);
    return [...group].sort((a,b)=>{
        const ha=h[a.id],hb=h[b.id];
        const tA=ha.wins+ha.losses,tB=hb.wins+hb.losses;
        const pA=tA>0?ha.wins/tA:.5,pB=tB>0?hb.wins/tB:.5;
        if(Math.abs(pA-pB)>1e-8) return pB-pA;
        const rA=ha.pa>0?ha.pf/ha.pa:1,rB=hb.pa>0?hb.pf/hb.pa:1;
        if(Math.abs(rA-rB)>1e-8) return rB-rA; return 0;
    });
}
function getPlayoffStatuses(standings,spots=8){
    const n=standings.length; const statuses={};
    if(n<=spots) return statuses;
    const team8=standings[spots-1];
    let bestOut=0; for(let k=spots;k<n;k++) bestOut=Math.max(bestOut,standings[k].wins+standings[k].remaining);
    for(let k=0;k<n;k++){
        const t=standings[k];
        if(k<spots){ if(bestOut<t.wins) statuses[t.id]='clinched'; }
        else{ if(t.wins+t.remaining<team8.wins) statuses[t.id]='eliminated'; }
    }
    return statuses;
}

// ============================================================
//  PLAYOFF HELPERS
// ============================================================
const R2_A=[0,3,5,6], R2_B=[1,2,4,7];
function po(){ return season().playoff||{}; }
function r1Winner(m){ if(!m||m.score1===null||m.score2===null) return null; return m.score1>m.score2?m.team1Id:m.team2Id; }
function getR2TeamIds(group){
    const p=po(); if(!p.generated||!p.round1?.length) return [null,null,null,null];
    return (group==='A'?R2_A:R2_B).map(i=>r1Winner(p.round1[i]));
}
function getR2Stats(teamId,games){ let wins=0,losses=0,pf=0,pa=0; for(const g of games){ if(g.team1Id===teamId){pf+=g.score1;pa+=g.score2;g.score1>g.score2?wins++:losses++;} else if(g.team2Id===teamId){pf+=g.score2;pa+=g.score1;g.score2>g.score1?wins++:losses++;} } return {wins,losses,pf,pa}; }
function getR2Standings(group){
    const p=po(); const teamIds=getR2TeamIds(group).filter(id=>id!==null);
    if(!teamIds.length) return [];
    const games=(p.round2?.[group]?.games)||[];
    const n=teamIds.length;
    const entries=teamIds.map(id=>{ const s=getR2Stats(id,games); const gp=s.wins+s.losses; return {id,rawName:getTeam(id)?.name||'?',...s,gp,winPct:gp>0?s.wins/gp:null,remaining:Math.max(0,(n-1)-gp)}; });
    entries.sort((a,b)=>{ const pa=a.winPct??-1,pb=b.winPct??-1; if(Math.abs(pa-pb)>1e-8) return pb-pa; if(a.wins!==b.wins) return b.wins-a.wins; return a.losses-b.losses; });
    const result=[]; let i=0;
    while(i<entries.length){
        let j=i+1; while(j<entries.length){ const a=entries[i],b=entries[j]; if(Math.abs((a.winPct??-1)-(b.winPct??-1))<1e-8&&a.wins===b.wins&&a.losses===b.losses) j++; else break; }
        if(j-i===1){ result.push(entries[i]); } else {
            const grp=entries.slice(i,j); const h={}; for(const id of grp.map(t=>t.id)) h[id]={wins:0,losses:0,pf:0,pa:0};
            for(const g of games){ if(!grp.map(t=>t.id).includes(g.team1Id)||!grp.map(t=>t.id).includes(g.team2Id)) continue; const {team1Id:t1,team2Id:t2,score1:s1,score2:s2}=g; if(s1>s2){h[t1].wins++;h[t2].losses++;}else{h[t2].wins++;h[t1].losses++;} h[t1].pf+=s1;h[t1].pa+=s2;h[t2].pf+=s2;h[t2].pa+=s1; }
            result.push(...[...grp].sort((a,b)=>{ const ha=h[a.id],hb=h[b.id]; const tA=ha.wins+ha.losses,tB=hb.wins+hb.losses; const pA=tA>0?ha.wins/tA:.5,pB=tB>0?hb.wins/tB:.5; if(Math.abs(pA-pB)>1e-8) return pB-pA; const rA=ha.pa>0?ha.pf/ha.pa:1,rB=hb.pa>0?hb.pf/hb.pa:1; if(Math.abs(rA-rB)>1e-8) return rB-rA; return 0; }));
        }
        i=j;
    }
    return result;
}
function getR2Statuses(standings){ const n=standings.length,spots=2,statuses={}; if(n<=spots) return statuses; const cut=standings[spots-1]; let bestOut=0; for(let k=spots;k<n;k++) bestOut=Math.max(bestOut,standings[k].wins+standings[k].remaining); for(let k=0;k<n;k++){ const t=standings[k]; if(k<spots){ if(bestOut<t.wins) statuses[t.id]='clinched'; } else{ if(t.wins+t.remaining<cut.wins) statuses[t.id]='eliminated'; } } return statuses; }

// ============================================================
//  FORMAT
// ============================================================
function fmtPct(p){ if(p===null) return '-'; if(p>=1) return '1.000'; if(p<=0) return '.000'; return p.toFixed(3).slice(1); }
function fmtGB(gb){ if(gb===null||gb<0) return '-'; if(gb===0) return '-'; return gb%1===0?String(gb):gb.toFixed(1); }

// ============================================================
//  SEARCH
// ============================================================
let searchQuery = '';

function onSearchInput(){
    const input = document.getElementById('search-input');
    searchQuery = input.value.trim();
    document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
    renderSearchResults();
}

function clearSearch(){
    document.getElementById('search-input').value = '';
    searchQuery = '';
    document.getElementById('search-clear').classList.remove('visible');
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('main-content').style.display = '';
}

function renderSearchResults(){
    const resultsEl = document.getElementById('search-results');
    const mainEl    = document.getElementById('main-content');
    if(!searchQuery){ resultsEl.style.display='none'; mainEl.style.display=''; return; }

    // Find matching teams in current season (both divisions)
    const s = season();
    const allTeams = [];
    for(const div of ['east','west']){
        for(const t of s.divisions[div]) allTeams.push({...t, division:div});
    }
    const matched = allTeams.filter(t => t.name.toLowerCase().includes(searchQuery.toLowerCase()));

    if(!matched.length){
        resultsEl.innerHTML=`<div class="no-results">找不到包含「${escHtml(searchQuery)}」的隊伍</div>`;
        resultsEl.style.display='block'; mainEl.style.display='none'; return;
    }

    const divName = {east:'東區', west:'西區'};
    let html = '';

    for(const team of matched){
        // Get all games for this team in this season
        const teamGames = s.games.filter(g => g.team1Id===team.id || g.team2Id===team.id);
        const sortedGames = [...teamGames].sort((a,b)=> new Date(b.date||0)-new Date(a.date||0));

        let wins=0, losses=0;
        let cardsHtml = '';

        for(const g of sortedGames){
            const isTeam1 = g.team1Id===team.id;
            const myScore = isTeam1 ? g.score1 : g.score2;
            const opScore = isTeam1 ? g.score2 : g.score1;
            const oppId   = isTeam1 ? g.team2Id : g.team1Id;
            const opp     = getTeam(oppId);
            const won     = myScore > opScore;
            won ? wins++ : losses++;
            const date = g.date ? new Date(g.date).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}) : '';
            cardsHtml += `
                <div class="game-result-card">
                    <span class="gr-tag">${divName[g.division]||''}</span>
                    <div class="gr-body">
                        <div class="gr-vs">vs <span>${escHtml(opp?.name||'?')}</span></div>
                        <div class="gr-score">${myScore} : ${opScore}</div>
                        ${date?`<div class="gr-date">${date}</div>`:''}
                    </div>
                    <span class="gr-result ${won?'gr-win':'gr-loss'}">${won?'勝':'負'}</span>
                </div>`;
        }

        if(!sortedGames.length) cardsHtml=`<div style="padding:10px 0;color:#4a5080;font-size:.85rem">尚無比賽紀錄</div>`;

        html += `<div style="padding:12px 16px">
            <div class="search-result-header">${divName[team.division]} <span>${escHtml(team.name)}</span></div>
            ${cardsHtml}
            ${wins+losses>0?`<div class="search-summary">${wins+losses} 場 ${wins} 勝 ${losses} 負</div>`:''}
        </div>`;
    }

    resultsEl.innerHTML=html;
    resultsEl.style.display='block';
    mainEl.style.display='none';
}

// ============================================================
//  RENDER
// ============================================================
function renderAll(){
    renderSeasonBar();
    renderModeBar();
    renderRoundBar();
    renderSearchArea();
    renderMainContent();
}

function renderSeasonBar(){
    const bar=document.getElementById('season-bar');
    const names=Object.keys(state.seasons).sort();
    let h='<span class="bar-label">賽季</span>';
    for(const n of names) h+=`<button class="tab-btn${n===state.currentSeason?' active':''}" onclick="switchSeason('${escHtml(n)}')">${escHtml(n)}</button>`;
    bar.innerHTML=h;
}

function renderModeBar(){
    document.getElementById('mode-bar').innerHTML=`
        <button class="mode-btn${view.mode==='regular'?' active':''}" onclick="setMode('regular')">例行賽</button>
        <button class="mode-btn${view.mode==='playoff'?' active':''}" onclick="setMode('playoff')">季後賽</button>`;
}

function renderRoundBar(){
    const bar=document.getElementById('round-bar');
    if(view.mode!=='playoff'){ bar.style.display='none'; return; }
    bar.style.display='flex';
    const rounds=[['round1','第一輪'],['round2','第二輪'],['semis','四強'],['finals','冠軍賽']];
    bar.innerHTML=rounds.map(([k,l])=>`<button class="round-btn${view.round===k?' active':''}" onclick="setRound('${k}')">${l}</button>`).join('');
}

function renderSearchArea(){
    // Only show in regular season mode
    document.getElementById('search-area').style.display = view.mode==='regular' ? 'block' : 'none';
    if(view.mode!=='regular'){ searchQuery=''; if(document.getElementById('search-input')) document.getElementById('search-input').value=''; }
}

function renderMainContent(){
    if(view.mode==='regular'){
        renderRegularSeason();
    } else {
        clearSearchDisplay();
        switch(view.round){
            case 'round1': renderRound1(); break;
            case 'round2': renderRound2(); break;
            case 'semis':  renderSemis();  break;
            case 'finals': renderFinals(); break;
        }
    }
}

function clearSearchDisplay(){
    document.getElementById('search-results').style.display='none';
    document.getElementById('main-content').style.display='';
}

// ── Regular Season ──
function renderRegularSeason(){
    clearSearchDisplay();
    // If there's an active search, re-render search results
    if(searchQuery) renderSearchResults();
    const mc=document.getElementById('main-content');
    mc.style.cssText='display:grid;padding:14px 16px;grid-template-columns:1fr 1fr;gap:14px';
    mc.innerHTML=`
        <div class="division-section">
            <div class="division-header east">
                <span class="division-title">東 區</span>
                <span class="team-count" id="east-count"></span>
            </div>
            <div id="east-standings"></div>
        </div>
        <div class="division-section">
            <div class="division-header west">
                <span class="division-title">西 區</span>
                <span class="team-count" id="west-count"></span>
            </div>
            <div id="west-standings"></div>
        </div>`;
    renderDivStandings('east');
    renderDivStandings('west');
}

function renderDivStandings(division){
    const standings=getStandings(division);
    const countEl=document.getElementById(`${division}-count`);
    const container=document.getElementById(`${division}-standings`);
    if(!countEl||!container) return;
    const n=standings.length;
    countEl.textContent=n?`${n}隊`:'';
    if(n===0){ container.innerHTML=`<div class="empty-state">尚無球隊</div>`; return; }
    const statuses=getPlayoffStatuses(standings,8);
    const spots=Math.min(8,n);
    const leader=standings[0];
    const note=n>8?`<div class="playoff-note">── 季後賽分界（前${spots}名晉級）──</div>`:'';
    let rows='';
    for(let i=0;i<n;i++){
        const t=standings[i]; const status=statuses[t.id]; const isLast=i===spots-1&&n>spots;
        let gb=null; if(leader.gp>0&&t.gp>0) gb=((leader.wins-t.wins)+(t.losses-leader.losses))/2;
        let rk; if(i===0) rk=`<span class="medal-gold">1</span>`; else if(i===1) rk=`<span class="medal-silver">2</span>`; else if(i===2) rk=`<span class="medal-bronze">3</span>`; else rk=i+1;
        let badge=''; if(status==='clinched') badge='<span class="status-badge status-clinched">晉級</span>'; else if(status==='eliminated') badge='<span class="status-badge status-eliminated">淘汰</span>';
        rows+=`<tr class="${isLast?'cutoff-line':''}"><td class="rank-cell">${rk}</td><td class="left"><div class="team-name-cell"><span>${escHtml(t.name)}</span>${badge}</div></td><td class="win-color">${t.wins}</td><td class="loss-color">${t.losses}</td><td>${fmtPct(t.winPct)}</td><td class="gb-color">${fmtGB(gb)}</td></tr>`;
    }
    container.innerHTML=`${note}<table class="standings-table"><thead><tr><th>#</th><th class="left">球隊</th><th>勝</th><th>負</th><th>勝率</th><th>勝差</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Round 1 ──
function renderRound1(){
    const p=po(); const mc=document.getElementById('main-content');
    mc.style.cssText='display:block;padding:14px 16px';
    if(!p.generated){ mc.innerHTML=`<div class="po-notice">尚未產生季後賽對戰組合</div>`; return; }
    const labels=['東一 vs 西八','東二 vs 西七','東三 vs 西六','東四 vs 西五','東五 vs 西四','東六 vs 西三','東七 vs 西二','東八 vs 西一'];
    let cards='';
    (p.round1||[]).forEach((m,i)=>{
        const t1=getTeam(m.team1Id),t2=getTeam(m.team2Id);
        const hasScore=m.score1!==null&&m.score2!==null;
        const w1=hasScore&&m.score1>m.score2,w2=hasScore&&m.score2>m.score1;
        cards+=`<div class="matchup-card${hasScore?' played':''}">
            <div class="matchup-side"><div class="match-seed">${m.team1Seed||''}</div><div class="match-team${!m.team1Id?' pending':w1?' winner':w2?' loser':''}">${m.team1Id?escHtml(t1?.name||'?'):'待定'}</div></div>
            <div class="match-center"><div class="match-score${!hasScore?' pending':''}">${hasScore?`${m.score1}:${m.score2}`:'－:－'}</div><div class="match-label">${labels[i]||''}</div></div>
            <div class="matchup-side"><div class="match-seed">${m.team2Seed||''}</div><div class="match-team${!m.team2Id?' pending':w2?' winner':w1?' loser':''}">${m.team2Id?escHtml(t2?.name||'?'):'待定'}</div></div>
        </div>`;
    });
    mc.innerHTML=`<div class="division-section"><div class="matchup-section-title">第一輪對戰組合</div><div class="matchup-grid">${cards}</div></div>`;
}

// ── Round 2 ──
function renderRound2(){
    const p=po(); const mc=document.getElementById('main-content');
    mc.style.cssText='display:block;padding:14px 16px';
    if(!p.generated){ mc.innerHTML=`<div class="po-notice">尚未產生季後賽對戰組合</div>`; return; }
    mc.innerHTML=`<div class="r2-grid"><div id="r2-A"></div><div id="r2-B"></div></div>`;
    ['A','B'].forEach(group=>{
        const container=document.getElementById(`r2-${group}`);
        const standings=getR2Standings(group);
        const statuses=getR2Statuses(standings);
        let rows='';
        if(!standings.length){ rows=`<tr><td colspan="5" style="text-align:center;color:#4a5080;padding:12px;font-size:.85rem">第一輪尚未完成</td></tr>`; }
        else { standings.forEach((t,i)=>{ const status=statuses[t.id]; const isLast=i===1&&standings.length>2; let rk; if(i===0) rk=`<span class="medal-gold">1</span>`; else if(i===1) rk=`<span class="medal-silver">2</span>`; else rk=i+1; let badge=''; if(status==='clinched') badge='<span class="status-badge status-clinched">晉四強</span>'; else if(status==='eliminated') badge='<span class="status-badge status-eliminated">淘汰</span>'; rows+=`<tr class="${isLast?'cutoff-line':''}"><td class="rank-cell">${rk}</td><td class="left"><div class="team-name-cell"><span>${escHtml(t.rawName)}</span>${badge}</div></td><td class="win-color">${t.wins}</td><td class="loss-color">${t.losses}</td><td>${fmtPct(t.winPct)}</td></tr>`; }); }
        container.innerHTML=`<div class="r2-group-section"><div class="r2-group-header ${group==='A'?'groupA':'groupB'}"><span class="r2-group-title">${group} 區</span></div><table class="standings-table"><thead><tr><th>#</th><th class="left">球隊</th><th>勝</th><th>負</th><th>勝率</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    });
}

// ── Semis ──
function renderSemis(){
    const p=po(); const mc=document.getElementById('main-content');
    mc.style.cssText='display:block;padding:14px 16px';
    if(!p.generated){ mc.innerHTML=`<div class="po-notice">尚未產生季後賽對戰組合</div>`; return; }
    const stA=getR2Standings('A'),stB=getR2Standings('B');
    const specs=[{t1:stA[0],s1:'A區 第1',t2:stB[1],s2:'B區 第2',label:'四強 第1場'},{t1:stA[1],s1:'A區 第2',t2:stB[0],s2:'B區 第1',label:'四強 第2場'}];
    let cards='';
    specs.forEach((spec,i)=>{
        const m=(p.semis&&p.semis[i])||{score1:null,score2:null};
        const t1id=spec.t1?.id||null,t2id=spec.t2?.id||null;
        const hasScore=m.score1!==null&&m.score2!==null;
        const w1=hasScore&&m.score1>m.score2,w2=hasScore&&m.score2>m.score1;
        cards+=`<div class="matchup-card${hasScore?' played':''}">
            <div class="matchup-side"><div class="match-seed">${spec.s1}</div><div class="match-team${!t1id?' pending':w1?' winner':w2?' loser':''}">${t1id?escHtml(spec.t1.rawName):'待定'}</div></div>
            <div class="match-center"><div class="match-score${!hasScore?' pending':''}">${hasScore?`${m.score1}:${m.score2}`:'－:－'}</div><div class="match-label">${spec.label}</div></div>
            <div class="matchup-side"><div class="match-seed">${spec.s2}</div><div class="match-team${!t2id?' pending':w2?' winner':w1?' loser':''}">${t2id?escHtml(spec.t2.rawName):'待定'}</div></div>
        </div>`;
    });
    mc.innerHTML=`<div class="division-section"><div class="matchup-section-title">四強</div><div class="matchup-grid">${cards}</div></div>`;
}

// ── Finals ──
function renderFinals(){
    const p=po(); const mc=document.getElementById('main-content');
    mc.style.cssText='display:block;padding:14px 16px';
    if(!p.generated){ mc.innerHTML=`<div class="po-notice">尚未產生季後賽對戰組合</div>`; return; }
    const stA=getR2Standings('A'),stB=getR2Standings('B');
    const s1=p.semis&&p.semis[0],s2=p.semis&&p.semis[1];
    let fin1id=null,fin2id=null;
    if(s1&&s1.score1!==null) fin1id=s1.score1>s1.score2?s1.team1Id:s1.team2Id;
    if(s2&&s2.score1!==null) fin2id=s2.score1>s2.score2?s2.team1Id:s2.team2Id;
    const m=p.finals||{score1:null,score2:null};
    const hasScore=m.score1!==null&&m.score2!==null;
    const w1=hasScore&&m.score1>m.score2,w2=hasScore&&m.score2>m.score1;
    const card=`<div class="matchup-card${hasScore?' played':''}">
        <div class="matchup-side"><div class="match-seed">四強第1場勝者</div><div class="match-team${!fin1id?' pending':w1?' winner':w2?' loser':''}">${fin1id?escHtml(getTeam(fin1id)?.name||'?'):'待定'}</div></div>
        <div class="match-center"><div class="match-score${!hasScore?' pending':''}" style="font-size:1.4rem">${hasScore?`${m.score1}:${m.score2}`:'－:－'}</div><div class="match-label">冠軍賽</div></div>
        <div class="matchup-side"><div class="match-seed">四強第2場勝者</div><div class="match-team${!fin2id?' pending':w2?' winner':w1?' loser':''}">${fin2id?escHtml(getTeam(fin2id)?.name||'?'):'待定'}</div></div>
    </div>`;
    mc.innerHTML=`<div class="division-section"><div class="matchup-section-title">冠軍賽</div><div class="finals-wrap">${card}</div></div>`;
}

// ============================================================
//  NAVIGATION
// ============================================================
function switchSeason(name){ state.currentSeason=name; clearSearch(); view={mode:'regular',round:'round1'}; renderAll(); }
function setMode(m){ view.mode=m; clearSearch(); renderAll(); }
function setRound(r){ view.round=r; renderAll(); }

// ============================================================
//  INIT
// ============================================================
loadState();
renderAll();
</script>
